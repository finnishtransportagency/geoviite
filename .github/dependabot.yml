version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "org.seleniumhq*"
    groups:
      spring-boot:
        patterns:
          - "org.springframework*"
          - "io.spring*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
      flyway:
        patterns:
          - "org.flywaydb*"
      geotools:
        patterns:
          - "org.geotools*"
      auth0:
        patterns:
          - "com.auth0*"
      jakarta-xml:
        patterns:
          - "jakarta.activation*"
          - "jakarta.xml.bind*"
          - "org.glassfish.jaxb*"
      test-dependencies:
        dependency-type: "development"
        patterns:
          - "org.mock-server*"
          - "org.apache.httpcomponents*"
          - "io.projectreactor:reactor-test"
      gradle:
        patterns:
          - "gradle"
      other:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react"
          - "react-*"
          - "@types/react*"
          - "@reduxjs/*"
          - "redux"
          - "redux-*"
          - "i18next"
          - "i18next-*"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "*eslint*"
          - "typescript-eslint"
      jest:
        patterns:
          - "jest"
          - "jest-*"
          - "@jest/*"
          - "ts-jest"
      webpack:
        patterns:
          - "webpack"
          - "webpack-*"
          - "*-webpack-plugin"
          - "*-loader"
      other:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
